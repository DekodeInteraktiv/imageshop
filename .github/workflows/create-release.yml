name: Create release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version'
                required: true
                default: ''

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24'
                  cache: 'npm'

            - name: Install NPM dependencies
              run: npm ci

            - name: Get changelog entries
              id: changelog
              run: |
                  chmod +x ./.github/extract_latest_changelog.sh
                  ./.github/extract_latest_changelog.sh readme.txt

            - name: Build dependencies
              run: npm run build

            - name: Build plugin zip
              run: npm run plugin-zip

            - name: Upload plugin zip artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: plugin-zip
                  path: ./imageshop-dam-connector.zip
                  retention-days: 1

            - name: Tag the release
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "github-actions@github.com"
                  git tag "${{ inputs.version }}"
                  git push --tags

            - name: Create GitHub release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
              with:
                  tag_name: ${{ inputs.version }}
                  name: Release ${{ inputs.version }}
                  body_path: ./latest_changelog.md
                  draft: false
                  prerelease: false
                  files: ./imageshop-dam-connector.zip

    deploy-wordpress-org:
        needs: build
        uses: ./.github/workflows/wordpress-org-deploy.yml
        with:
            deploy_plugin: true
            dry_run: true
        secrets: inherit
