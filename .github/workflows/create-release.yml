name: Create release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version'
                required: true
                default: ''

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '16'
                  cache: 'npm'

            - name: Install NPM dependencies
              run: npm ci

            - name: Get changelog entries
              id: changelog
              run: |
                  chmod +x ./.github/extract_latest_changelog.sh
                  ./.github/extract_latest_changelog.sh readme.txt

            - name: Build dependencies
              run: npm run build

            - name: Build plugin zip
              run: npm run plugin-zip

            - name: Tag the release
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "github-actions@github.com"
                  git tag "${{ inputs.version }}"
                  git push --tags

            - name: Create GitHub release
              id: create_github_release
              uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ inputs.version }}
                  release_name: Release ${{ inputs.version }}
                  draft: false
                  body_path: ./latest_changelog.md
                  prerelease: false

            - name: Attach plugin zip to release
              id: upload-release-asset
              uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_github_release.outputs.upload_url }}
                  asset_path: ./imageshop-dam-connector.zip
                  asset_name: imageshop-dam-connector.zip
                  asset_content_type: application/zip
